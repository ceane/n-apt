name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  pull-requests: read

jobs:
  # Detect changes for conditional testing
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend-changed: ${{ steps.changes.outputs.frontend }}
      rust-changed: ${{ steps.changes.outputs.rust }}
      wasm-changed: ${{ steps.changes.outputs.wasm }}
      integration-changed: ${{ steps.changes.outputs.integration }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect file changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            frontend:
              - 'src/ts/**'
              - 'src/md-preview/**'
              - 'src/types/**'
              - 'test/ts/**'
              - 'packages/**'
              - 'package*.json'
              - 'tsconfig*.json'
              - 'jest.config.*'
              - 'vite.config.*'
              - 'tailwind.config.*'
              - 'postcss.config.*'
            integration:
              - 'test/integration/**'
              - 'scripts/test/integration/**'
              - 'signals.yaml'
            rust:
              - 'src/rs/**'
              - 'test/rust/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'build.rs'
              - 'rustfmt.toml'
              - 'clippy.toml'
              - 'signals.yaml'
            wasm:
              - 'src/rs/lib.rs'
              - 'src/rs/wasm/**'
              - 'src/rs/simd/**'
              - 'test/wasm/**'
              - 'Cargo-wasm.toml'
              - 'scripts/build/build_wasm.sh'

  # Frontend tests
  frontend-tests:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend-changed == 'true' || github.ref == 'refs/heads/main'
    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run linting
        run: npm run lint

      - name: Run type checking
        run: npm run typecheck

      - name: Run tests (Affected Only on Branches)
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            npm test
          else
            npm test -- --changedSince=origin/main --passWithNoTests
          fi

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage/lcov.info
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # Rust tests
  rust-tests:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.rust-changed == 'true' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y librtlsdr-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run Rust tests
        run: cargo test --profile dev-fast

      - name: Upload Rust coverage
        uses: codecov/codecov-action@v4
        with:
          flags: rust
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # WASM tests
  wasm-tests:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.wasm-changed == 'true' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run WASM tests
        run: npm run test:wasm

  # Integration tests
  integration-tests:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: |
      github.ref == 'refs/heads/main' ||
      needs.detect-changes.outputs.frontend-changed == 'true' || 
      needs.detect-changes.outputs.rust-changed == 'true' || 
      needs.detect-changes.outputs.wasm-changed == 'true' || 
      needs.detect-changes.outputs.integration-changed == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: "npm"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y librtlsdr-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target/
            node_modules
          key: ${{ runner.os }}-integration-${{ hashFiles('**/Cargo.lock', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-integration-
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build WASM (if changed)
        if: needs.detect-changes.outputs.wasm-changed == 'true' || github.ref == 'refs/heads/main'
        run: npm run build:wasm

      - name: Run integration tests (Affected Only on Branches)
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            npm run test:integration
          else
            npm run test:integration -- --changedSince=origin/main --passWithNoTests
          fi
