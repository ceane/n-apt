<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDR Spectrum Stitcher Demo</title>
    <style>
        body {
            background: #1a1a1a;
            color: #fff;
            font-family: 'Courier New', monospace;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
        }
        .controls {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        input[type="file"] {
            background: #3a3a3a;
            color: #fff;
            padding: 10px;
            border: 1px solid #555;
            border-radius: 4px;
            margin: 10px 0;
            width: 100%;
        }
        button {
            background: #0a0;
            color: #000;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            margin: 10px 5px 10px 0;
            font-family: inherit;
        }
        button:hover {
            background: #0f0;
        }
        button:disabled {
            background: #555;
            color: #888;
            cursor: not-allowed;
        }
        canvas {
            border: 1px solid #555;
            background: #000;
            display: block;
            margin: 20px 0;
            width: 100%;
            height: auto;
        }
        .info {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 4px;
            margin-top: 10px;
            font-size: 14px;
        }
        .info div {
            margin: 5px 0;
        }
        .status {
            color: #0f0;
            font-weight: bold;
        }
        .error {
            color: #f00;
        }
        .file-list {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 4px;
            margin: 10px 0;
            max-height: 200px;
            overflow-y: auto;
        }
        .file-item {
            padding: 5px;
            margin: 2px 0;
            background: #3a3a3a;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <h1>🛰️ SDR Spectrum Stitcher</h1>
    
    <div class="controls">
        <h2>Load IQ Captures (.c64 files)</h2>
        <input type="file" id="file-input" multiple accept=".c64" />
        <div id="file-list" class="file-list" style="display: none;"></div>
        
        <button id="stitch-btn" disabled>Stitch Spectrum</button>
        <button id="clear-btn">Clear</button>
        
        <div class="info">
            <div>FFT Size: <span id="fft-size">262144</span></div>
            <div>Sample Rate: <span id="sample-rate">3.2 MHz</span></div>
            <div id="status" class="status">Ready. Select .c64 files to begin.</div>
        </div>
    </div>
    
    <canvas id="spectrum-canvas" width="1400" height="500"></canvas>
    
    <div class="info" id="results-info" style="display: none;">
        <h3>Stitched Spectrum Info</h3>
        <div>Frequency Points: <span id="num-points">0</span></div>
        <div>Frequency Range: <span id="freq-range">0 - 0 MHz</span></div>
        <div>Processing Time: <span id="process-time">0</span> ms</div>
    </div>

    <script type="module">
        import init, { SpectrumStitcher } from './pkg/sdr_wasm.js';

        let stitcher = null;
        let isInitialized = false;

        const fileInput = document.getElementById('file-input');
        const stitchBtn = document.getElementById('stitch-btn');
        const clearBtn = document.getElementById('clear-btn');
        const statusEl = document.getElementById('status');
        const canvas = document.getElementById('spectrum-canvas');
        const ctx = canvas.getContext('2d');

        // Initialize WASM
        async function initWasm() {
            try {
                await init();
                isInitialized = true;
                statusEl.textContent = 'WASM initialized. Select .c64 files.';
            } catch (error) {
                statusEl.textContent = 'Error initializing WASM: ' + error.message;
                statusEl.classList.add('error');
            }
        }

        // Parse frequency from filename (e.g., "iq_3.70MHz.c64" or "iq_500kHz.c64")
        function parseFrequency(filename) {
            const match = filename.match(/iq_(\d+\.?\d*)([kM]Hz)/);
            if (!match) return null;
            
            const value = parseFloat(match[1]);
            const unit = match[2];
            
            return unit === 'MHz' ? value * 1e6 : value * 1e3;
        }

        // File input handler
        fileInput.addEventListener('change', (e) => {
            const files = e.target.files;
            if (files.length > 0) {
                stitchBtn.disabled = false;
                
                // Show file list
                const fileListDiv = document.getElementById('file-list');
                fileListDiv.style.display = 'block';
                fileListDiv.innerHTML = '<h3>Selected Files:</h3>';
                
                Array.from(files).forEach(file => {
                    const freq = parseFrequency(file.name);
                    const freqStr = freq ? `${(freq / 1e6).toFixed(2)} MHz` : 'Unknown frequency';
                    fileListDiv.innerHTML += `<div class="file-item">${file.name} - ${freqStr}</div>`;
                });
                
                statusEl.textContent = `${files.length} file(s) selected. Click "Stitch Spectrum" to process.`;
            }
        });

        // Stitch button handler
        stitchBtn.addEventListener('click', async () => {
            if (!isInitialized) {
                statusEl.textContent = 'WASM not initialized yet...';
                return;
            }

            const files = fileInput.files;
            if (files.length === 0) return;

            stitchBtn.disabled = true;
            statusEl.textContent = 'Processing...';

            const startTime = performance.now();

            try {
                // Create stitcher
                const fftSize = 262144;
                const sampleRate = 3.2e6;
                stitcher = new SpectrumStitcher(fftSize, sampleRate);

                // Process each file
                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    const centerFreq = parseFrequency(file.name);
                    
                    if (!centerFreq) {
                        console.warn(`Skipping ${file.name} - couldn't parse frequency`);
                        continue;
                    }

                    statusEl.textContent = `Processing ${i + 1}/${files.length}: ${file.name}...`;
                    
                    const arrayBuffer = await file.arrayBuffer();
                    const iqData = new Float32Array(arrayBuffer);
                    
                    stitcher.add_capture(iqData, centerFreq);
                }

                const processingTime = (performance.now() - startTime).toFixed(2);

                // Get results
                const frequencies = stitcher.get_frequencies();
                const powerDb = stitcher.get_power_db();
                const [minFreq, maxFreq] = stitcher.get_frequency_range();

                // Update info
                document.getElementById('num-points').textContent = stitcher.len().toLocaleString();
                document.getElementById('freq-range').textContent = 
                    `${(minFreq / 1e6).toFixed(2)} - ${(maxFreq / 1e6).toFixed(2)} MHz`;
                document.getElementById('process-time').textContent = processingTime;
                document.getElementById('results-info').style.display = 'block';

                // Plot
                plotSpectrum(frequencies, powerDb);

                statusEl.textContent = `✓ Stitching complete! Processed ${files.length} captures in ${processingTime} ms`;
                statusEl.classList.remove('error');
            } catch (error) {
                statusEl.textContent = 'Error: ' + error.message;
                statusEl.classList.add('error');
                console.error(error);
            } finally {
                stitchBtn.disabled = false;
            }
        });

        // Clear button handler
        clearBtn.addEventListener('click', () => {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            fileInput.value = '';
            document.getElementById('file-list').style.display = 'none';
            document.getElementById('results-info').style.display = 'none';
            stitchBtn.disabled = true;
            statusEl.textContent = 'Cleared. Select new files.';
            if (stitcher) {
                stitcher.clear();
            }
        });

        // Plot spectrum
        function plotSpectrum(frequencies, powerDb) {
            const width = canvas.width;
            const height = canvas.height;

            // Clear canvas
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);

            if (frequencies.length === 0) return;

            // Find min/max
            const freqMin = frequencies[0];
            const freqMax = frequencies[frequencies.length - 1];
            
            let powerMin = Infinity;
            let powerMax = -Infinity;
            for (let i = 0; i < powerDb.length; i++) {
                if (powerDb[i] < powerMin) powerMin = powerDb[i];
                if (powerDb[i] > powerMax) powerMax = powerDb[i];
            }

            // Draw grid
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1;
            for (let i = 0; i < 10; i++) {
                const y = (height / 10) * i;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
                ctx.stroke();
            }

            // Draw spectrum
            ctx.strokeStyle = '#0f0';
            ctx.lineWidth = 1.5;
            ctx.beginPath();

            for (let i = 0; i < frequencies.length; i++) {
                const x = ((frequencies[i] - freqMin) / (freqMax - freqMin)) * width;
                const normalizedPower = (powerDb[i] - powerMin) / (powerMax - powerMin);
                const y = height - (normalizedPower * height);
                
                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }

            ctx.stroke();

            // Draw labels
            ctx.fillStyle = '#fff';
            ctx.font = '14px Courier New';
            
            // Frequency labels
            ctx.fillText(`${(freqMin / 1e6).toFixed(2)} MHz`, 10, height - 10);
            ctx.fillText(`${(freqMax / 1e6).toFixed(2)} MHz`, width - 120, height - 10);
            
            // Power labels
            ctx.fillText(`${powerMax.toFixed(1)} dB`, 10, 20);
            ctx.fillText(`${powerMin.toFixed(1)} dB`, 10, height - 30);
        }

        // Initialize on load
        initWasm();
    </script>
</body>
</html>
