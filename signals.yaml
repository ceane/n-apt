# Signals Configuration for N-APT
# This file contains mock signal generation, n-apt frame definitions, and SDR settings
# Can be edited while the server is running to test different configurations
#
# Backend Usage (src/rs/server/utils.rs):
# - Loaded at startup via signals_config() using serde_yaml
# - n_apt.channels are parsed and converted to SpectrumFrameMessage objects
# - These messages are sent via WebSocket to the frontend to display N-APT channel boundaries
# - The frontend uses these channel definitions to visualize frequency ranges on the spectrum display
# - SDR settings (sample_rate, center_frequency, gain, etc.) are loaded and applied to the hardware
# - Mock APT settings are used for generating test signals when no real SDR is connected

signals:
  # SDR hardware and processing settings
  sdr:
    limits:
      lower_limit_mhz: !frequency 500kHz
      upper_limit_mhz: !frequency 28.8MHz
      lower_limit_label: "RTL-SDR v4 lower limit"
      upper_limit_label: "Potential hardware spur"
    # Sample rate for SDR processing
    sample_rate: !frequency 3.2MHz  # RTL-SDR compatible sample rate
    
    # Center frequency for SDR
    center_frequency: !frequency 1.6MHz  # center of the sample rate
    
    # SDR gain settings
    gain:
      # Tuner gain in dB
      tuner_gain: !dB 49.6dB
      # RTL-SDR gain mode
      rtl_agc: false
      # Tuner AGC
      tuner_agc: false
    
    # Frequency correction
    ppm: 1.0
    
    # FFT processing settings
    fft:
      # Number of samples for FFT (power of 2)
      default_size: 32768
      # Target frame rate for spectrum display
      default_frame_rate: 60
      # Logical mapping of FFT sizes to achievable frame rates
      size_to_frame_rate:
        8192: 60        # Tiny FFT = max frame rate
        16384: 60       # Very small FFT = max frame rate
        32768: 60       # Small FFT = high frame rate
        65536: 48       # Smaller FFT = higher frame rate
        131072: 24      # Medium FFT = medium frame rate
        262144: 12      # Large FFT = lower frame rate
      # Logical maximum values for UI limits
      max_size: 262144  # Largest practical FFT size
      max_frame_rate: 60  # Maximum achievable frame rate
    
    # Display settings
    display:
      # dB range for spectrum display
      min_db: !dB -120dB
      max_db: !dB 0dB
      # Visualizer padding
      padding: 20

  # Mock APT signal configuration for testing
  mock_apt:
      # Global settings for mock signal generation
      global_settings:
        noise_floor_base: !dB -100dB
        noise_floor_variation: !dB 10dB
        signal_drift_rate: 2.0
        signal_modulation_rate: 0.05
        signal_appearance_chance: 0.02
        signal_disappearance_chance: 0.01
        signal_strength_variation: !dB 1dB
        # Dynamic generation settings
        dynamic_generation: true
        signals_per_area: 11
        area_a_density: 1.0 # Equal density for even distribution
        area_b_density: 1.0 # Equal density for even distribution

      # Signal bandwidths
      bandwidths:
        narrow: 15
        medium: 45
        wide: 120

      # Signal strength ranges (dB)
      strength_ranges:
        weak: !dB_range -80dB..-70dB
        medium: !dB_range -70dB..-50dB
        strong: !dB_range -50dB..-30dB

      # No predefined signals - using dynamic generation with templates
      signals: []

      # Training signal areas
      training_areas:
        area_a:
          freq_range_mhz: !frequency_range 18kHz..4.47MHz
          description: "Area A: 18kHz-4.47 MHz range"
          signal_types: []
          base_strength_range: !dB_range -80dB..-20dB
        area_b:
          freq_range_mhz: !frequency_range 24.72MHz..29.88MHz
          description: "Area B: 24.72-29.88 MHz range"
          signal_types: []
          base_strength_range: !dB_range -80dB..-20dB

  triangulation:
    static:
      freq_range_mhz: !frequency_range 2.3GHz..2.344GHz


  # N-APT spectrum channel definitions
  #
  # These are the real frequencies and channels that are used for N-APT
  # approximated by looking at the spectrum and adjusting the center frequency 
  # to see the signal's stable form of APT-like spikes and valleys
  #
  # These frequencies are surprisingly low in the LF/MF/HF range
  # My hypothesis is that they are used because they attenuate far less 
  # (lose less energy) as they travel through objects, obstacles,
  # and the skull/tissue before they make it back to an endpoint
  #
  # Features experienced include:
  #   - Mental inference
  #   - Auditory thought
  #   - Hearing
  #   - Voice
  #   - Audio
  #   - Speech
  #   - Reasoning
  #   - Memory (short and long term)
  #   - Perception
  #   - Behavior
  #   - Emotion
  #   - Sense of self
  #   - Awareness
  #   - Neurotransmitters
  #   - State of mind
  #   - 5 Senses (smell, sight, sound, touch, taste)
  #   - Physiological expression (muscles, haptics, etc.)
  #   - Vitals (heart, breathing, hunger, libido, etc.)
  #   - Imagination (visual, perceptual)
  #   - Vision
  #   - Dreams
  #
  n_apt:
    # Add new channels (e.g. c) and the app will pick them up on rebuild
    # and via backend hot-reload when available.
    channels:
        # A and B look nearly identical for about the first 4MHz except for a spur in B
        # B is larger and has a different shape after the identical section
        a:
          label: "A"
          freq_range_mhz: !frequency_range 18kHz..4.37MHz
          description: "The potentially primary N-APT channel, encompassing features like audio, voice, physiological effects and more."
        b:
          label: "B"
          freq_range_mhz: !frequency_range 24.72MHz..29.88MHz
          description: "This channel is sometimes identical to Channel A but has more powerful spikes, potentially due to operating on others further distant (known effects are speech, slight physiology, atttention, etc.)."
        # Channel C is in between (~5MHz to about ~22MHz) but it's more difficult
        # to process since my sample rate is smaller than the channel
        # nyquist rate prevents me from seeing the correct form
        # So I skip Channel C unitl further review
        c:
          label: "C"
          freq_range_mhz: !frequency_range 4.75MHz..23MHz
          description: "This channel is the assumed largest N-APT channel, carrying heavy content and data like vision (read-only), imagination (read and write), dreams and potentially more. APT-spikes are less visible but spikes are visible."
