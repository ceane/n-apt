# Redis configuration for N-APT persistent data storage

# Network
bind 127.0.0.1
port 6379

# Persistence
save 900 1
save 300 10
save 60 10000

# RDB snapshot settings
dbfilename dump.rdb
dir /Users/ceanelamerez/Documents/codescratch.nosync/n-apt/redis/data

# AOF (Append Only File) for maximum durability
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# Memory management
maxmemory 2gb
maxmemory-policy allkeys-lru

# Logging
loglevel notice
logfile /Users/ceanelamerez/Documents/codescratch.nosync/n-apt/redis/logs/redis.log

# Security (development only)
protected-mode no

# Performance
tcp-keepalive 300
timeout 0
