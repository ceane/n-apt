# Rustfmt configuration
# 2-space indentation, 80 character line limits

edition = "2021"
hard_tabs = false
tab_spaces = 2
max_width = 80
use_small_heuristics = "Default"

# Performance optimizations (stable only)
merge_derives = true
use_try_shorthand = false
use_field_init_shorthand = true
force_explicit_abi = true
remove_nested_parens = true
