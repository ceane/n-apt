# Rust formatting and linting configuration
# 2-space indentation, 80 character line limits

[formatting]
# Use 2 spaces for indentation
indent_style = "Block"
# Maximum line length
max_width = 80
# Use tab width of 2 spaces
tab_spaces = 2
# Format imports
imports_granularity = "Crate"
# Group imports
group_imports = "StdExternalCrate"
# Order imports
imports_layout = "Vertical"
# Format strings
format_strings = false
# Format comments
format_code_in_doc_comments = true
# Wrap comments
wrap_comments = true
# Comment width
comment_width = 80

[lints]
# Enable all clippy lints
clippy = "all"
# Allow some pedantic lints that are too strict
allow = [
  "clippy::module_name_repetitions",
  "clippy::must_use_candidate",
  "clippy::missing_errors_doc",
  "clippy::missing_panics_doc",
  "clippy::missing_docs_in_private_items",
  "clippy::single_match_else",
  "clippy::default_trait_access",
  "clippy::redundant_clone",
  "clippy::redundant_closure_for_method_calls",
  "clippy::needless_return",
  "clippy::collapsible_else_if",
  "clippy::collapsible_if",
  "clippy::collapsible_match",
  "collapsible_if",
  "collapsible_else_if",
  "collapsible_match",
  "use_self",
]

# Deny some lints that we don't want
deny = ["clippy::unimplemented", "clippy::todo", "clippy::indexing_slicing", "clippy::unwrap_used"]

[lints.rust]
# Allow some rustc lints that are too strict
allow = ["dead_code", "unused_variables", "unused_imports", "unused_mut", "unreachable_patterns"]

[lints.rust2018]
# Allow some 2018 edition lints
allow = ["unused_variables", "dead_code", "unused_imports"]

[lints.rust2021]
# Allow some 2021 edition lints
allow = ["unused_variables", "dead_code", "unused_imports"]

# Performance lints
[lints.performance]
allow = ["clippy::many_args", "clippy::large_enum_variant"]

# Documentation lints
[lints.documentation]
allow = ["missing_docs_in_private_items"]
