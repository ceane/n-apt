<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test FFT Stitcher</title>
    <style>
      body {
        font-family: "JetBrains Mono", monospace;
        background-color: #0a0a0a;
        color: #ccc;
        margin: 0;
        padding: 20px;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
      }
      .status {
        background-color: #1a1a1a;
        border: 1px solid #2a2a2a;
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 20px;
        text-align: center;
      }
      .file-input {
        margin-bottom: 20px;
      }
      button {
        background-color: #1a1a1a;
        border: 1px solid #00d4ff;
        border-radius: 6px;
        padding: 8px 12px;
        color: #00d4ff;
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
        margin-right: 10px;
      }
      button:hover {
        background-color: #2a2a2a;
      }
      .file-list {
        background-color: #1a1a1a;
        border: 1px solid #2a2a2a;
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 20px;
        max-height: 200px;
        overflow-y: auto;
      }
      .file-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 4px 0;
        border-bottom: 1px solid #2a2a2a;
      }
      .file-item:last-child {
        border-bottom: none;
      }
      .remove-btn {
        background: transparent;
        border: 1px solid #666;
        color: #666;
        font-size: 10px;
        padding: 2px 6px;
      }
      .remove-btn:hover {
        border-color: #ff4444;
        color: #ff4444;
      }
      canvas {
        border: 1px solid #2a2a2a;
        border-radius: 4px;
        width: 100%;
        height: 400px;
        background-color: #0a0a0a;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>FFT Stitcher Test</h1>

      <div class="status" id="status">Select .c64 files to begin stitching</div>

      <div class="file-input">
        <input type="file" id="fileInput" accept=".c64" multiple style="display: none" />
        <button onclick="document.getElementById('fileInput').click()">Browse Files</button>
        <button onclick="stitchFiles()" id="stitchBtn" disabled>Stitch Spectrum</button>
        <button onclick="clearFiles()" id="clearBtn" disabled>Clear</button>
      </div>

      <div class="file-list" id="fileList" style="display: none">
        <h3>Selected Files:</h3>
        <div id="fileItems"></div>
      </div>

      <canvas id="canvas" style="display: none"></canvas>
    </div>

    <script>
      let selectedFiles = [];
      let stitchedData = null;

      const statusEl = document.getElementById("status");
      const fileListEl = document.getElementById("fileList");
      const fileItemsEl = document.getElementById("fileItems");
      const stitchBtnEl = document.getElementById("stitchBtn");
      const clearBtnEl = document.getElementById("clearBtn");
      const canvasEl = document.getElementById("canvas");

      document.getElementById("fileInput").addEventListener("change", (e) => {
        selectedFiles = Array.from(e.target.files).map((file) => ({ name: file.name, file }));
        updateUI();
      });

      function updateUI() {
        if (selectedFiles.length === 0) {
          statusEl.textContent = "Select .c64 files to begin stitching";
          fileListEl.style.display = "none";
          stitchBtnEl.disabled = true;
          clearBtnEl.disabled = true;
          canvasEl.style.display = "none";
        } else {
          statusEl.textContent = `${selectedFiles.length} file(s) selected`;
          fileListEl.style.display = "block";
          stitchBtnEl.disabled = false;
          clearBtnEl.disabled = false;

          fileItemsEl.innerHTML = selectedFiles
            .map(
              (file, index) => `
                    <div class="file-item">
                        <span>${file.name}</span>
                        <button class="remove-btn" onclick="removeFile(${index})">Remove</button>
                    </div>
                `,
            )
            .join("");
        }
      }

      function removeFile(index) {
        selectedFiles = selectedFiles.filter((_, i) => i !== index);
        updateUI();
      }

      function clearFiles() {
        selectedFiles = [];
        stitchedData = null;
        updateUI();
      }

      async function loadC64File(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = (e) => {
            try {
              const buffer = e.target.result;
              const view = new DataView(buffer);
              const data = [];

              for (let i = 0; i < buffer.byteLength; i++) {
                data.push(view.getUint8(i));
              }

              resolve(data);
            } catch (error) {
              reject(error);
            }
          };
          reader.onerror = () => reject(new Error(`Failed to read file: ${file.name}`));
          reader.readAsArrayBuffer(file);
        });
      }

      function processToSpectrum(rawData) {
        const fftSize = 1024;
        const spectrum = new Array(fftSize).fill(0);

        for (let i = 0; i < Math.min(rawData.length, fftSize * 2); i += 2) {
          const real = rawData[i] || 0;
          const imag = rawData[i + 1] || 0;
          const magnitude = Math.sqrt(real * real + imag * imag);
          const bin = Math.floor(i / 2) % fftSize;
          spectrum[bin] = 20 * Math.log10(magnitude + 1e-10);
        }

        return spectrum;
      }

      function parseFrequencyFromFilename(filename) {
        const match = filename.match(/iq_(\d+\.?\d*)MHz/);
        if (match) {
          return parseFloat(match[1]);
        }
        return 0.0;
      }

      function drawSpectrum(waveform) {
        const canvas = canvasEl;
        const ctx = canvas.getContext("2d");
        const width = canvas.width;
        const height = canvas.height;

        // Clear canvas
        ctx.fillStyle = "#0a0a0a";
        ctx.fillRect(0, 0, width, height);

        // Draw grid
        ctx.strokeStyle = "#2a2a2a";
        ctx.lineWidth = 1;

        // Horizontal lines
        for (let i = 0; i <= 10; i++) {
          const y = (height / 10) * i;
          ctx.beginPath();
          ctx.moveTo(0, y);
          ctx.lineTo(width, y);
          ctx.stroke();
        }

        // Vertical lines
        for (let i = 0; i <= 20; i++) {
          const x = (width / 20) * i;
          ctx.beginPath();
          ctx.moveTo(x, 0);
          ctx.lineTo(x, height);
          ctx.stroke();
        }

        // Draw spectrum
        ctx.strokeStyle = "#00d4ff";
        ctx.lineWidth = 2;
        ctx.beginPath();

        const step = width / waveform.length;
        for (let i = 0; i < waveform.length; i++) {
          const x = i * step;
          const normalizedValue = (waveform[i] + 100) / 100; // Normalize -100 to 0 dB range
          const y = height - normalizedValue * height;

          if (i === 0) {
            ctx.moveTo(x, y);
          } else {
            ctx.lineTo(x, y);
          }
        }

        ctx.stroke();
      }

      async function stitchFiles() {
        if (selectedFiles.length === 0) {
          statusEl.textContent = "No files selected for stitching";
          return;
        }

        statusEl.textContent = `Loading ${selectedFiles.length} files...`;
        stitchBtn.disabled = true;

        try {
          const fileData = [];

          for (let i = 0; i < selectedFiles.length; i++) {
            const selectedFile = selectedFiles[i];
            statusEl.textContent = `Loading file ${i + 1}/${selectedFiles.length}: ${selectedFile.name}`;

            const rawData = await loadC64File(selectedFile.file);
            const spectrum = processToSpectrum(rawData);
            const frequency = parseFrequencyFromFilename(selectedFile.name);

            fileData.push({
              name: selectedFile.name,
              waveform: spectrum,
              frequencyRange: { min: frequency - 0.1, max: frequency + 0.1 },
            });
          }

          if (fileData.length === 0) {
            throw new Error("No files could be loaded successfully");
          }

          statusEl.textContent = "Stitching spectrum data...";
          const combinedWaveform = [];
          let minFreq = Infinity;
          let maxFreq = -Infinity;

          for (const data of fileData) {
            combinedWaveform.push(...data.waveform);
            minFreq = Math.min(minFreq, data.frequencyRange.min);
            maxFreq = Math.max(maxFreq, data.frequencyRange.max);
          }

          stitchedData = {
            name: `Stitched_${fileData.length}_files`,
            waveform: combinedWaveform,
            frequencyRange: { min: minFreq, max: maxFreq },
          };

          statusEl.textContent = `Successfully stitched ${fileData.length} files`;
          canvasEl.style.display = "block";
          drawSpectrum(stitchedData.waveform);

          setTimeout(() => {
            statusEl.textContent = `${selectedFiles.length} file(s) selected - Stitching complete`;
          }, 3000);
        } catch (error) {
          statusEl.textContent = `Stitching failed: ${error.message}`;
          setTimeout(() => {
            statusEl.textContent = `${selectedFiles.length} file(s) selected`;
          }, 3000);
        } finally {
          stitchBtn.disabled = false;
        }
      }
    </script>
  </body>
</html>
